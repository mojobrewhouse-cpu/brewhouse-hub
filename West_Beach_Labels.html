<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>West Beach Vodka Labels</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WB Labels">
<meta name="theme-color" content="#0a0a12">
<style>
:root{--bg:#0a0a12;--card:#16161e;--ink:#e8e8f0;--muted:#6a6a7a;--accent:#4a9aba;--gold:#c8a848;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;overflow:hidden;touch-action:pan-y;}
body{display:flex;flex-direction:column;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;background:rgba(10,10,18,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:calc(env(safe-area-inset-top) + 8px) 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:.4px;color:#e8e8f0;}
.topbar h1 span{color:var(--accent);}
.controls{display:flex;gap:10px;align-items:center;}
.btn{background:rgba(255,255,255,.08);border:none;color:#ccc;font-size:13px;padding:7px 12px;border-radius:10px;font-weight:600;}
.btn:active{background:rgba(255,255,255,.18);}
.btn.on{background:var(--accent);color:#fff;}
.slider{flex:1;position:relative;overflow:hidden;margin-top:calc(env(safe-area-inset-top) + 44px);}
.track{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);height:100%;}
.slide{min-width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px 80px;position:relative;}
.slide svg{max-height:60vh;max-width:88vw;filter:drop-shadow(0 8px 30px rgba(0,0,0,.5));}
.slide-info{margin-top:16px;text-align:center;}
.slide-num{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.slide-name{font-size:22px;font-weight:800;margin:4px 0 2px;color:#fff;}
.slide-desc{font-size:13px;color:var(--muted);max-width:340px;line-height:1.4;}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(10,10,18,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);display:flex;align-items:center;justify-content:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .25s;}
.dot.active{background:var(--accent);width:22px;border-radius:4px;}
.arrows{position:fixed;top:50%;left:0;right:0;z-index:15;display:flex;justify-content:space-between;padding:0 8px;transform:translateY(-50%);pointer-events:none;}
.arrow{pointer-events:auto;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.4);font-size:28px;width:40px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.arrow:active{background:rgba(255,255,255,.15);color:#fff;}
</style>
</head>
<body>
<div class="topbar">
  <h1><span>◆</span> West Beach Vodka</h1>
  <div class="controls">
    <button class="btn" id="autoBtn" onclick="toggleAuto()">Auto</button>
    <span id="counter" style="font-size:12px;color:var(--muted);font-weight:600;min-width:42px;text-align:right;">1 / 21</span>
  </div>
</div>
<div class="slider" id="slider"><div class="track" id="track"></div></div>
<div class="arrows">
  <button class="arrow" onclick="go(-1)">‹</button>
  <button class="arrow" onclick="go(1)">›</button>
</div>
<div class="nav" id="nav"></div>

{num:"14",name:"Tide Chart (Original)",desc:"Sine wave tide pattern, grid lines, HIGH/LOW markers, scientific nautical",bg:"#e8eef2",cap:"#2c4a5e",labelBg:"#f8fbfd",labelBorder:"#4a7a96",lines:[{t:"THE BREWHOUSE",s:8,c:"#4a7a96",y:-60},{t:"SANTA BARBARA HARBOR · 34°N 119°W",s:6,c:"#8aabb8",y:-48},{t:"West Beach",s:20,c:"#1c3a4e",y:50,b:1},{t:"VODKA",s:12,c:"#4a7a96",y:68,b:1},{t:"Est. 1996 · 80 Proof · 750 ML",s:6,c:"#8aabb8",y:80}],features:["tide","grid-blue"]},
{num:"14-A",name:"Dark Tide",desc:"Navy background, glowing blue wave trace, sonar-screen feel",bg:"#0c1a28",cap:"#0c1a28",labelBg:"#081420",labelBorder:"#2a6a8a",lines:[{t:"BREWHOUSE DISTILLERY",s:8,c:"#4a9aba",y:-60},{t:"SANTA BARBARA HARBOR · 34.4°N",s:6,c:"#2a6a8a",y:-48},{t:"West Beach",s:20,c:"#c8e8f8",y:50,b:1},{t:"VODKA",s:12,c:"#6abada",y:68,b:1},{t:"Est. 1996 · 80 Proof · 750 ML",s:6,c:"#3a7a9a",y:80}],features:["tide-glow","grid-navy","dots"]},{num:"14-B",name:"Minimal Tide",desc:"White label, single clean wave, no grid — gallery-art clean",bg:"#f8f6f2",cap:"#2c4a5e",labelBg:"#ffffff",labelBorder:"#c8d8e2",lines:[{t:"THE BREWHOUSE",s:8,c:"#8aabb8",y:-60},{t:"West Beach",s:22,c:"#1c3a4e",y:45,b:1},{t:"VODKA",s:12,c:"#4a7a96",y:63,b:1},{t:"Santa Barbara · Est. 1996 · 80 Proof",s:7,c:"#8aabb8",y:78}],features:["wave-blue","baseline"]},

function wavePath(cx,cy,w,amp,periods,steps=80){
  let d='';
  for(let i=0;i<=steps;i++){
    let t=i/steps, x=cx-w/2+t*w, y=cy+amp*Math.sin(t*periods*2*Math.PI);
    d+=(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1);
  }
  return d;
}

function buildSVG(L){
  const W=220,H=420,cx=W/2,cy=H/2+10;
  const bw=120,bh=220,nw=36,nh=42,ch=20;
  const lw=100,lh=144;

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect x="${cx-nw/2}" y="${cy-bh/2-nh-ch}" width="${nw}" height="${ch}" rx="3" fill="${L.cap}"/>`;
  svg+=`<rect x="${cx-nw/2}" y="${cy-bh/2-nh}" width="${nw}" height="${nh}" fill="${L.bg}"/>`;
  svg+=`<rect x="${cx-bw/2}" y="${cy-bh/2}" width="${bw}" height="${bh}" rx="5" fill="${L.bg}" stroke="${L.labelBorder}" stroke-width=".5"/>`;
  svg+=`<rect x="${cx-lw/2}" y="${cy-lh/2}" width="${lw}" height="${lh}" rx="3" fill="${L.labelBg}" stroke="${L.labelBorder}" stroke-width=".8"/>`;

  const f=L.features;
  const lx=cx-lw/2, ly=cy-lh/2;

  if(f.includes('grid-warm')){
    for(let i=0;i<=4;i++){
      let yy=ly+i*lh/4;
      svg+=`<line x1="${lx}" y1="${yy}" x2="${lx+lw}" y2="${yy}" stroke="#d0c8b8" stroke-width=".3"/>`;
      let xx=lx+i*lw/4;
      svg+=`<line x1="${xx}" y1="${ly}" x2="${xx}" y2="${ly+lh}" stroke="#d0c8b8" stroke-width=".3"/>`;
    }
  }
  if(f.includes('grid-blue')){
    for(let i=0;i<=5;i++){
      let yy=ly+20+i*(lh-40)/5;
      svg+=`<line x1="${lx+5}" y1="${yy}" x2="${lx+lw-5}" y2="${yy}" stroke="#c8d8e2" stroke-width=".3"/>`;
      let xx=lx+5+i*(lw-10)/5;
      svg+=`<line x1="${xx}" y1="${ly+20}" x2="${xx}" y2="${ly+lh-40}" stroke="#c8d8e2" stroke-width=".3"/>`;
    }
  }
  if(f.includes('grid-navy')){
    for(let i=0;i<=5;i++){
      let yy=ly+20+i*(lh-40)/5;
      svg+=`<line x1="${lx+5}" y1="${yy}" x2="${lx+lw-5}" y2="${yy}" stroke="#1a3a5a" stroke-width=".3"/>`;
      let xx=lx+5+i*(lw-10)/5;
      svg+=`<line x1="${xx}" y1="${ly+20}" x2="${xx}" y2="${ly+lh-40}" stroke="#1a3a5a" stroke-width=".3"/>`;
    }
  }
  if(f.includes('grid-copper')){
    for(let i=0;i<=5;i++){
      let yy=ly+20+i*(lh-40)/5;
      svg+=`<line x1="${lx+5}" y1="${yy}" x2="${lx+lw-5}" y2="${yy}" stroke="#3a2a10" stroke-width=".3"/>`;
      let xx=lx+5+i*(lw-10)/5;
      svg+=`<line x1="${xx}" y1="${ly+20}" x2="${xx}" y2="${ly+lh-40}" stroke="#3a2a10" stroke-width=".3"/>`;
    }
  }

  if(f.includes('wave-dark')){
    svg+=`<path d="${wavePath(cx,cy,lw-10,16,1)}" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>`;
  }
  if(f.includes('wave-blue')){
    svg+=`<path d="${wavePath(cx,cy-5,lw-10,18,1)}" fill="none" stroke="#2c6a8a" stroke-width="1.5"/>`;
    svg+=`<line x1="${lx+5}" y1="${cy-5}" x2="${lx+lw-5}" y2="${cy-5}" stroke="#d8e4ea" stroke-width=".3"/>`;
  }

  if(f.includes('tide')){
    svg+=`<path d="${wavePath(cx,cy,lw-10,16,1.5)}" fill="none" stroke="#2c6a8a" stroke-width="1.3"/>`;
    svg+=`<line x1="${lx+5}" y1="${cy}" x2="${lx+lw-5}" y2="${cy}" stroke="#a0b8c8" stroke-width=".3" stroke-dasharray="3,3"/>`;
  }
  if(f.includes('tide-glow')){
    svg+=`<path d="${wavePath(cx,cy,lw-10,16,1.5)}" fill="none" stroke="#8acaea" stroke-width="1.8"/>`;
    svg+=`<line x1="${lx+5}" y1="${cy}" x2="${lx+lw-5}" y2="${cy}" stroke="#2a4a5e" stroke-width=".3" stroke-dasharray="3,3"/>`;
  }
  if(f.includes('tide-copper')){
    svg+=`<path d="${wavePath(cx,cy,lw-10,16,1.5)}" fill="none" stroke="#c88040" stroke-width="1.8"/>`;
    svg+=`<line x1="${lx+5}" y1="${cy}" x2="${lx+lw-5}" y2="${cy}" stroke="#5a4020" stroke-width=".3" stroke-dasharray="3,3"/>`;
  }
  if(f.includes('dots')){
    svg+=`<circle cx="${cx+4}" cy="${cy-7}" r="2.2" fill="#8acaea"/>`;
    svg+=`<circle cx="${cx-25}" cy="${cy+16}" r="2.2" fill="#8acaea"/>`;
  }
  if(f.includes('dots-copper')){
    svg+=`<circle cx="${cx+4}" cy="${cy-7}" r="2.2" fill="#c88040"/>`;
    svg+=`<circle cx="${cx-25}" cy="${cy+16}" r="2.2" fill="#c88040"/>`;
  }

  if(f.includes('topo')){
    for(let i=0;i<5;i++){
      let yoff=cy-10+i*7;
      svg+=`<path d="${wavePath(cx,yoff,lw-10,7-i*1.2,1.5+i*.2)}" fill="none" stroke="#8aaa6a" stroke-width=".5"/>`;
    }
  }

  if(f.includes('deco')){
    svg+=`<line x1="${lx+8}" y1="${cy-42}" x2="${lx+lw-8}" y2="${cy-42}" stroke="#c8a848" stroke-width=".8"/>`;
    svg+=`<line x1="${lx+12}" y1="${cy-38}" x2="${lx+lw-12}" y2="${cy-38}" stroke="#c8a848" stroke-width=".8"/>`;
    svg+=`<line x1="${lx+8}" y1="${cy+35}" x2="${lx+lw-8}" y2="${cy+35}" stroke="#c8a848" stroke-width=".8"/>`;
    svg+=`<line x1="${lx+12}" y1="${cy+39}" x2="${lx+lw-12}" y2="${cy+39}" stroke="#c8a848" stroke-width=".8"/>`;
  }

  if(f.includes('seal')){
    svg+=`<circle cx="${cx}" cy="${cy-8}" r="30" fill="none" stroke="#2c4a5e" stroke-width="1.3"/>`;
    svg+=`<circle cx="${cx}" cy="${cy-8}" r="27" fill="none" stroke="#2c4a5e" stroke-width="1.3"/>`;
  }

  if(f.includes('barrel-stamp')){
    svg+=`<circle cx="${cx}" cy="${cy-5}" r="34" fill="none" stroke="#6a5028" stroke-width="1.8"/>`;
    svg+=`<circle cx="${cx}" cy="${cy-5}" r="31" fill="none" stroke="#6a5028" stroke-width="1.8"/>`;
  }

  if(f.includes('ocean-fill')){
    let fillD=wavePath(cx,cy+10,lw-10,18,1.5);
    fillD+=`L${lx+lw-5},${cy+lh/2-8}L${lx+5},${cy+lh/2-8}Z`;
    svg+=`<path d="${fillD}" fill="#d4e8f2" stroke="none"/>`;
    svg+=`<path d="${wavePath(cx,cy+10,lw-10,18,1.5)}" fill="none" stroke="#2c6a8a" stroke-width="1.3"/>`;
  }

  if(f.includes('dual-wave')){
    svg+=`<text x="${lx+5}" y="${cy-14}" font-size="4.5" fill="#3a7a9a" font-family="Helvetica,sans-serif">AM</text>`;
    svg+=`<path d="${wavePath(cx,cy-20,lw-16,12,1.5)}" fill="none" stroke="#6abada" stroke-width="1"/>`;
    svg+=`<line x1="${lx+5}" y1="${cy-2}" x2="${lx+lw-5}" y2="${cy-2}" stroke="#2a4a5e" stroke-width=".3"/>`;
    svg+=`<text x="${lx+5}" y="${cy+8}" font-size="4.5" fill="#3a7a9a" font-family="Helvetica,sans-serif">PM</text>`;
    svg+=`<path d="${wavePath(cx,cy+12,lw-16,12,1.5)}" fill="none" stroke="#4a9aba" stroke-width=".7"/>`;
  }
  if(f.includes('time-axis')){
    const times=["00","06","12","18","24"];
    times.forEach((t,i)=>{
      let xx=lx+8+i*(lw-16)/4;
      svg+=`<text x="${xx}" y="${cy+32}" font-size="4.5" fill="#2a4a5e" font-family="Helvetica,sans-serif">${t}</text>`;
    });
  }

  if(f.includes('tide-table')){
    svg+=`<text x="${lx+5}" y="${cy-38}" font-size="5" fill="#8aabb8" font-family="Helvetica,sans-serif">TIDE TABLE · SANTA BARBARA</text>`;
    svg+=`<text x="${lx+5}" y="${cy-28}" font-size="5" fill="#4a7a96" font-weight="bold" font-family="Helvetica,sans-serif">TIME    HEIGHT    TYPE</text>`;
    svg+=`<line x1="${lx+5}" y1="${cy-25}" x2="${lx+lw-5}" y2="${cy-25}" stroke="#d0dce4" stroke-width=".3"/>`;
    const rows=[["03:42","5.21 ft","HIGH"],["09:18","-0.34 ft","LOW"],["15:55","3.87 ft","HIGH"],["22:31","1.12 ft","LOW"]];
    rows.forEach(([time,ht,type],i)=>{
      let yy=cy-18+i*9;
      svg+=`<text x="${lx+5}" y="${yy}" font-size="5" fill="#5a7a8a" font-family="Helvetica,sans-serif">${time}   ${ht}   </text>`;
      svg+=`<text x="${lx+lw-22}" y="${yy}" font-size="5" fill="${type==='HIGH'?'#2a8a5a':'#8a4a3a'}" font-family="Helvetica,sans-serif">${type}</text>`;
    });
    svg+=`<path d="${wavePath(cx,cy+20,lw-10,10,1.5)}" fill="none" stroke="#2c6a8a" stroke-width=".8"/>`;
  }
  if(f.includes('wave-small')){}

  L.lines.forEach(ln=>{
    let fy=cy+ln.y;
    svg+=`<text x="${cx}" y="${fy}" text-anchor="middle" font-size="${ln.s}" fill="${ln.c}" font-weight="${ln.b?'bold':'normal'}" font-family="${ln.s>=18?'Georgia,Times,serif':'Helvetica,Arial,sans-serif'}">${ln.t.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`;
  });

  svg+=`</svg>`;
  return svg;
}

const track=document.getElementById('track');
const nav=document.getElementById('nav');
LABELS.forEach((L,i)=>{
  const slide=document.createElement('div');
  slide.className='slide';
  slide.innerHTML=buildSVG(L)+`<div class="slide-info"><div class="slide-num">Concept ${L.num}</div><div class="slide-name">${L.name}</div><div class="slide-desc">${L.desc}</div></div>`;
  track.appendChild(slide);
  const dot=document.createElement('div');
  dot.className='dot'+(i===0?' active':'');
  dot.onclick=()=>goTo(i);
  nav.appendChild(dot);
});

let cur=0, autoPlay=false, autoTimer=null;
const dots=nav.querySelectorAll('.dot');
const counter=document.getElementById('counter');
const autoBtn=document.getElementById('autoBtn');

function goTo(i){
  cur=Math.max(0,Math.min(LABELS.length-1,i));
  track.style.transform=`translateX(-${cur*100}%)`;
  dots.forEach((d,j)=>d.className='dot'+(j===cur?' active':''));
  counter.textContent=`${cur+1} / ${LABELS.length}`;
  resetAutoTimer();
}
function go(d){goTo(cur+d);}

function toggleAuto(){
  autoPlay=!autoPlay;
  autoBtn.className='btn'+(autoPlay?' on':'');
  if(autoPlay)startAuto(); else stopAuto();
}
function startAuto(){autoTimer=setInterval(()=>{goTo(cur>=LABELS.length-1?0:cur+1);},4000);}
function stopAuto(){clearInterval(autoTimer);}
function resetAutoTimer(){if(autoPlay){stopAuto();startAuto();}}

let sx=0,sy=0,dx=0,swiping=false;
const slider=document.getElementById('slider');
slider.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;swiping=true;track.style.transition='none';},{passive:true});
slider.addEventListener('touchmove',e=>{
  if(!swiping)return;
  dx=e.touches[0].clientX-sx;
  let dy=e.touches[0].clientY-sy;
  if(Math.abs(dy)>Math.abs(dx)){swiping=false;return;}
  e.preventDefault();
  let base=-cur*slider.offsetWidth;
  track.style.transform=`translateX(${base+dx}px)`;
},{passive:false});
slider.addEventListener('touchend',()=>{
  track.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';
  if(Math.abs(dx)>50){go(dx<0?1:-1);}else{goTo(cur);}
  swiping=false;
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key===' '){e.preventDefault();toggleAuto();}
});
</script>
</body>
</html>
