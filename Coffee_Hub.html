<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Brewhouse Coffee</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coffee">
<meta name="theme-color" content="#3B2417">
<style>
  :root{
    --bg:#F6F1E7; --ink:#2c2117; --muted:#7a6a58;
    --coffee:#6F4E37; --espresso:#3B2417; --accent:#C8860A; --line:#e6ddcd; --soon:#cbbfa9;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  header{background:var(--espresso);color:#fff;padding:calc(env(safe-area-inset-top) + 18px) 18px 18px;
    box-shadow:0 2px 10px rgba(0,0,0,.18);}
  header h1{margin:0;font-size:24px;font-weight:800;letter-spacing:.3px;}
  header h1 .cup{color:var(--accent);}
  header p{margin:4px 0 0;font-size:13px;color:#d9c9b3;}
  main{padding:18px 16px 40px;max-width:860px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  a.tile,div.tile{display:flex;flex-direction:column;justify-content:flex-end;text-decoration:none;
    border:none;border-radius:20px;padding:24px 18px;min-height:128px;color:#fff;
    box-shadow:0 4px 0 rgba(0,0,0,.12);}
  a.tile:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .tile .emoji{font-size:34px;margin-bottom:auto;}
  .tile .label{font-size:21px;font-weight:800;}
  .tile .sub{font-size:13px;font-weight:600;opacity:.85;margin-top:3px;}
  .t-recipes{background:var(--coffee);}
  .t-sched{background:var(--accent);color:#3B2417;}
  .t-sched .sub{opacity:.75;}
  .t-soon{background:#efe7d6;color:var(--soon);box-shadow:0 4px 0 rgba(0,0,0,.05);}
  .t-soon .label,.t-soon .sub{color:#b6a98e;}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:22px;}
</style>
</head>
<body>
<header>
  <h1><span class="cup">☕</span> Brewhouse Coffee</h1>
  <p>Coffee bar station — tap a tile</p>
</header>
<main>
  <div class="grid">
    <a class="tile t-recipes" href="Coffee_Recipes.html">
      <div class="emoji">☕</div>
      <div class="label">Recipes</div>
      <div class="sub">Espresso · Teas · Drip · Cold</div>
    </a>
    <a class="tile t-sched" href="https://app.getsling.com" target="_blank" rel="noopener">
      <div class="emoji">📅</div>
      <div class="label">Schedule</div>
      <div class="sub">Sling — log in for your shifts</div>
    </a>
    <div class="tile t-soon">
      <div class="emoji">🎵</div>
      <div class="label">Sonos</div>
      <div class="sub">Coming soon</div>
    </div>
    <div class="tile t-soon">
      <div class="emoji">📋</div>
      <div class="label">Menu</div>
      <div class="sub">Coming soon</div>
    </div>
  </div>
</main>
<footer>The Brewhouse · Santa Barbara</footer>
</body>
</html>
