<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Coffee Recipes</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coffee">
<meta name="theme-color" content="#5B3A29">
<style>
  :root{
    --bg:#F6F1E7; --card:#FFFFFF; --ink:#2c2117; --muted:#7a6a58;
    --coffee:#6F4E37; --espresso:#3B2417; --accent:#C8860A; --line:#e6ddcd;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  header{position:sticky;top:0;z-index:10;background:var(--espresso);color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;box-shadow:0 2px 10px rgba(0,0,0,.18);}
  .hrow{display:flex;align-items:center;gap:12px;}
  #back{display:none;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:17px;
    padding:9px 14px;border-radius:12px;font-weight:600;}
  #back:active{background:rgba(255,255,255,.3);}
  h1{font-size:21px;margin:0;font-weight:800;letter-spacing:.3px;flex:1;}
  h1 .cup{color:var(--accent);}
  #crumb{font-size:13px;color:#d9c9b3;margin-top:2px;min-height:14px;}
  #search{width:100%;margin-top:11px;border:none;border-radius:13px;padding:12px 14px;font-size:17px;
    background:#fff;color:var(--ink);}
  main{padding:14px 14px 40px;max-width:820px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .tile{background:var(--coffee);color:#fff;border:none;border-radius:18px;padding:22px 16px;
    font-size:19px;font-weight:700;text-align:left;min-height:92px;display:flex;flex-direction:column;
    justify-content:flex-end;box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .tile:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.12);}
  .tile small{font-weight:600;opacity:.8;font-size:13px;margin-bottom:4px;}
  .item{width:100%;background:#fff;border:1px solid var(--line);border-radius:15px;padding:17px 16px;
    font-size:18px;font-weight:600;text-align:left;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .item:active{background:#f0e8da;}
  .item .chev{color:var(--accent);font-size:20px;}
  .item .cat{font-size:12px;color:var(--muted);font-weight:600;}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;}
  .card h2{margin:0 0 4px;font-size:26px;color:var(--espresso);}
  .wally{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;font-weight:800;
    font-size:18px;padding:9px 15px;border-radius:12px;margin:6px 0 14px;}
  .svc{background:#f3ead9;border-left:4px solid var(--accent);padding:10px 12px;border-radius:8px;
    font-size:15px;color:#5a4a38;margin:10px 0 16px;font-style:italic;}
  .line{font-size:18px;line-height:1.5;padding:9px 0;border-bottom:1px dashed var(--line);}
  .line:last-child{border-bottom:none;}
  .sec-title{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    margin:18px 4px 8px;font-weight:700;}
  .empty{color:var(--muted);text-align:center;padding:40px 10px;font-size:17px;}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:18px;}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <button id="back" onclick="goBack()">‹ Back</button>
    <h1><span class="cup">☕</span> Coffee Recipes</h1>
  </div>
  <div id="crumb"></div>
  <input id="search" placeholder="Search drinks, syrups, tea…" autocomplete="off">
</header>
<main id="view"></main>
<footer>The Brewhouse · Santa Barbara — tap a category, then a recipe</footer>

<script>
const DATA = [
{"name":"Espresso","items":[
 {"name":"Espresso","service":"For Here: demitasse on saucer w/ spoon. Sparkling water on the side (Gibraltar).","wally":"","lines":["Dose: 19-21g coffee, fine grind","Yield: 26-30g finished","Time: 17-21 sec - watch color change, taste often"]},
 {"name":"Macchiato","service":"For Here: demitasse on saucer w/ spoon.","wally":"","lines":["Double shot espresso","Just a dollop of creamy foam on top"]},
 {"name":"Cortado","service":"For Here: Gibraltar glass.  To Go: 8oz paper cup.","wally":"2","lines":["Double shot espresso","4oz micro-foamed milk","In cup = 1/2 espresso, 1/2 micro-foam"]},
 {"name":"Cappuccino","service":"For Here: cappuccino cup + saucer + spoon.  To Go: 8oz paper cup.","wally":"3","lines":["Double shot espresso","6oz milk","In cup = 1/3 foam, 1/3 micro-foam, 1/3 espresso"]},
 {"name":"Flat White","service":"For Here: small 8oz mug.  To Go: 8oz paper cup.","wally":"2","lines":["Double shot espresso","6oz micro-foamed milk","In cup = 1/3 espresso, 2/3 micro-foam"]},
 {"name":"Latte","service":"Hot: 12/16oz mug or paper.  Iced: 16/20oz glass or 16/24oz PET.","wally":"1","lines":["12oz hot = 2 shots + 8oz steamed milk (flavored: +20mL syrup, or Horchata/Mocha/Mexican Mocha = 1 scoop)","16oz hot = 3 shots + 10oz steamed milk (flavored: +30mL syrup, or 2 scoop)","16oz iced = 2 shots + 8oz milk (flavored: +20mL syrup, or 1 scoop)","24oz iced = 3 shots + 10oz milk (flavored: +30mL syrup, or 2 scoop)"]},
 {"name":"Americano","service":"Hot: 12/16oz.  Iced: 12/16oz, or 16/24oz PET.","wally":"","lines":["12oz hot = 2 shots + 8oz water + 20mL flavor. 1oz chai.","16oz hot = 3 shots + 10oz water + 30mL flavor. 1.5oz chai.","16oz iced = 2 shots + 8oz water + 20mL flavor. 1oz chai.","20oz iced = 3 shots + 10oz water + 30mL flavor. 1.5oz chai."]}
]},
{"name":"Teas","items":[
 {"name":"London Fog (steep 4 min)","service":"Hot 12oz mug/paper. Iced 16/20oz glass.","wally":"","lines":["HOT 12oz = 2 tsp Earl Grey in 2oz hot water + 10mL lavender + 10mL vanilla + 8oz steamed milk","HOT 16oz = 3 tsp Earl Grey in 2oz hot water + 20mL lavender + 20mL vanilla + 10oz steamed milk","ICED 16oz = 2 tsp Earl Grey in 2oz hot water + 10mL lavender + 10mL vanilla + 8oz cold milk, ice","ICED 20oz = 3 tsp Earl Grey in 2oz hot water + 20mL lavender + 20mL vanilla + 10oz cold milk, ice"]},
 {"name":"Chamomile Tea Latte (steep 4 min)","service":"Hot 12oz mug/paper. Iced 16/20oz glass.","wally":"","lines":["HOT 12oz = 1 bag chamomile in 1oz hot water + 1 tbsp honey + 8oz steamed milk","HOT 16oz = 3 bags chamomile in 2oz hot water + 2 tbsp honey + 10oz steamed milk","ICED 16oz = 1 bag chamomile in 1oz hot water + 1 tbsp honey + 8oz cold milk, ice","ICED 20oz = 3 bags chamomile in 2oz hot water + 2 tbsp honey + 10oz cold milk, ice"]},
 {"name":"Black Iced Tea","service":"","wally":"","lines":["15g black tea in Clever Dripper + filter, 500g hot water, steep 5 min","Drip concentrate into pitcher, add 750g filtered water. Taste. Date 1 week out."]},
 {"name":"Peach Iced Tea","service":"","wally":"","lines":["6 bags peach tea in pitcher, 500g hot water, steep 7 min, remove bags","Add 750g filtered water. Taste. Date 1 week out."]},
 {"name":"Mint Iced Tea","service":"","wally":"","lines":["15g mint tea in Clever Dripper + filter, 500g hot water, steep 7 min","Drip concentrate into pitcher, add 750g filtered water. Taste. Date 1 week out."]}
]},
{"name":"Drip Coffee","items":[
 {"name":"Drip Coffee","service":"","wally":"","lines":["Small = 115g   ·   Med = 235g   ·   Large = 350g","Fire a fresh batch on the machine BEEP - not by stopwatch. Guests should not wait on drip.","First drip dropped by ~6:55 (before open). Run up to 3 carafes.","Clean drip pitchers at close.","Brew steps (filter / dose / grind / pre-wet + rinse): TO BE ADDED"]}
]}
];
const view = document.getElementById('view');
const back = document.getElementById('back');
const crumb = document.getElementById('crumb');
const search = document.getElementById('search');
let state = {level:'home', cat:null};

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderHome(){
  state={level:'home',cat:null};
  back.style.display='none'; crumb.textContent='';
  let h='<div class="grid">';
  DATA.forEach((c,i)=>{ h+=`<button class="tile" onclick="openCat(${i})"><small>${c.items.length} recipes</small>${esc(c.name)}</button>`; });
  h+='</div>';
  view.innerHTML=h; window.scrollTo(0,0);
}
function openCat(i){
  state={level:'cat',cat:i};
  back.style.display='block'; crumb.textContent=DATA[i].name;
  let h='';
  DATA[i].items.forEach((it,j)=>{ const w=it.wally?`<span class="wbadge">🔥 ${esc(it.wally)}</span>`:''; h+=`<button class="item" onclick="openItem(${i},${j})"><span>${esc(it.name)}</span><span>${w}<span class="chev">›</span></span></button>`; });
  view.innerHTML=h; window.scrollTo(0,0);
}
function openItem(i,j){
  state={level:'item',cat:i,item:j};
  back.style.display='block'; crumb.textContent=DATA[i].name+' › '+DATA[i].items[j].name;
  const it=DATA[i].items[j];
  let h='<div class="card"><h2>'+esc(it.name)+'</h2>';
  if(it.wally) h+='<div class="wally">🔥 Wally: set '+esc(it.wally)+'</div>';
  if(it.service) h+='<div class="svc">'+esc(it.service)+'</div>';
  it.lines.forEach(l=>{ h+='<div class="line">'+esc(l)+'</div>'; });
  h+='</div>';
  view.innerHTML=h; window.scrollTo(0,0);
}
function goBack(){ if(state.level==='item') openCat(state.cat); else renderHome(); }

search.addEventListener('input',()=>{
  const q=search.value.trim().toLowerCase();
  if(!q){ if(state.level==='home') renderHome(); else if(state.level==='cat') openCat(state.cat); else openItem(state.cat,state.item); return; }
  back.style.display='block'; crumb.textContent='Search: '+search.value;
  let res=[];
  DATA.forEach((c,i)=>c.items.forEach((it,j)=>{
    const hay=(it.name+' '+it.service+' '+it.lines.join(' ')).toLowerCase();
    if(hay.includes(q)) res.push({i,j,name:it.name,cat:c.name});
  }));
  if(!res.length){ view.innerHTML='<div class="empty">No matches for “'+esc(search.value)+'”</div>'; return; }
  let h='<div class="sec-title">'+res.length+' result'+(res.length>1?'s':'')+'</div>';
  res.forEach(r=>{ h+=`<button class="item" onclick="openItem(${r.i},${r.j})"><span>${esc(r.name)}<div class="cat">${esc(r.cat)}</div></span><span class="chev">›</span></button>`; });
  view.innerHTML=h; window.scrollTo(0,0);
});

renderHome();
</script>
</body>
</html>
