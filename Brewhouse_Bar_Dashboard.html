<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar Dash">
<link rel="apple-touch-icon" href="/brewhouse-hub/icon-192.png">
<link rel="manifest" href="/brewhouse-hub/manifest-bar.json">
<meta name="theme-color" content="#c8860a">
<title>Bar Dashboard — The Brewhouse</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111111;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --text: #e8e0d4;
  --muted: #8c8070;
  --accent: #c8860a;
  --green: #2ecc71;
  --red: #e74c3c;
  --amber: #f39c12;
  --blue: #3498db;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding: 0;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.bar-header {
  background: linear-gradient(135deg, #1a1209 0%, #2c1f0e 100%);
  border-bottom: 3px solid var(--accent);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.bar-header .logo {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900; color: #000;
  flex-shrink: 0;
}

.bar-header .title { flex: 1; }
.bar-header .title h1 { font-size: 18px; color: var(--accent); letter-spacing: 1px; }
.bar-header .title p { font-size: 11px; color: var(--muted); margin-top: 2px; }

.bar-header .clock {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.bar-header .clock .time { font-size: 22px; font-weight: 700; color: var(--text); }
.bar-header .clock .date { font-size: 10px; color: var(--muted); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  max-width: 1100px;
  margin: 0 auto;
}

@media (max-width: 700px) {
  .grid { grid-template-columns: 1fr; }
}

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}

.card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}

.card-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--border);
  color: var(--muted);
}
.card-badge.green { background: rgba(46,204,113,0.15); color: var(--green); }
.card-badge.amber { background: rgba(243,156,18,0.15); color: var(--amber); }
.card-badge.red { background: rgba(231,76,60,0.15); color: var(--red); }

.card-body { padding: 10px 14px; }

/* ── RESERVATIONS ── */
.rez-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.rez-item:last-child { border-bottom: none; }

.rez-time {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  min-width: 65px;
  text-align: center;
  background: rgba(200,134,10,0.1);
  padding: 4px 6px;
  border-radius: 6px;
}

.rez-details { flex: 1; }
.rez-name { font-size: 14px; font-weight: 600; color: var(--text); }
.rez-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

.rez-guests {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  min-width: 36px;
  text-align: center;
}
.rez-guests-label { font-size: 9px; color: var(--muted); text-align: center; display: block; }

.no-data {
  text-align: center;
  padding: 20px 10px;
  color: var(--muted);
  font-size: 13px;
}

/* ── STAFF LIST ── */
.staff-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.staff-row:last-child { border-bottom: none; }

.staff-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #000;
  flex-shrink: 0;
}
.staff-avatar.cook { background: #e74c3c; }
.staff-avatar.bartender { background: var(--accent); }
.staff-avatar.server { background: var(--blue); }
.staff-avatar.busser { background: #9b59b6; }
.staff-avatar.chef { background: #e67e22; }
.staff-avatar.manager { background: var(--green); }
.staff-avatar.host { background: #1abc9c; }
.staff-avatar.default { background: var(--muted); }

.staff-name { font-size: 13px; font-weight: 600; color: var(--text); }
.staff-role { font-size: 11px; color: var(--muted); }

/* ── SPECIALS ── */
.special-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
}
.special-item:last-child { margin-bottom: 0; }

.special-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.special-name { font-size: 14px; font-weight: 700; color: var(--text); }
.special-price { font-size: 14px; font-weight: 700; color: var(--green); }
.special-desc { font-size: 11px; color: var(--muted); margin-top: 3px; }
.special-tag {
  display: inline-block;
  margin-top: 4px;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--border);
  color: var(--accent);
  font-weight: 600;
}

/* ── 86 BOARD ── */
.eightysix-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: rgba(231,76,60,0.08);
  border: 1px solid rgba(231,76,60,0.2);
  border-radius: 8px;
  margin-bottom: 6px;
}
.eightysix-item:last-child { margin-bottom: 0; }
.eightysix-x { color: var(--red); font-size: 18px; font-weight: 900; }
.eightysix-name { font-size: 14px; font-weight: 600; color: var(--red); flex: 1; }
.eightysix-remove {
  background: none; border: none; color: var(--muted); font-size: 12px;
  cursor: pointer; padding: 4px 6px;
}

/* ── ADD FORMS ── */
.add-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.add-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
}
.add-input::placeholder { color: var(--muted); }
.add-btn {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.add-btn:active { opacity: 0.8; }
.add-btn.red-btn { background: var(--red); color: #fff; }

/* ── FOOTER ── */
.bar-footer {
  text-align: center;
  padding: 12px;
  color: var(--muted);
  font-size: 10px;
  border-top: 1px solid var(--border);
  margin-top: 10px;
}
.bar-footer a { color: var(--accent); text-decoration: none; }

/* ── FULL WIDTH CARD ── */
.full-width { grid-column: 1 / -1; }

/* Auto-refresh pulse */
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.refreshing { animation: pulse 1s ease-in-out; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="bar-header">
  <div class="logo">BH</div>
  <div class="title">
    <h1>BAR DASHBOARD</h1>
    <p>The Brewhouse — Santa Barbara</p>
  </div>
  <div class="clock">
    <div class="time" id="clock-time">--:--</div>
    <div class="date" id="clock-date">Loading...</div>
  </div>
</div>

<!-- MAIN GRID -->
<div class="grid">

  <!-- RESERVATIONS -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">📅 Today's Reservations</span>
      <span class="card-badge" id="rez-badge">Loading</span>
    </div>
    <div class="card-body" id="rez-body">
      <div class="no-data">Loading reservations...</div>
    </div>
  </div>

  <!-- STAFF ON SHIFT -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">👥 Staff Today</span>
      <span class="card-badge" id="staff-badge">Loading</span>
    </div>
    <div class="card-body" id="staff-body">
      <div class="no-data">Loading staff...</div>
    </div>
  </div>

  <!-- TODAY'S SPECIALS -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">🍽️ Today's Specials</span>
      <span class="card-badge" id="specials-badge">0</span>
    </div>
    <div class="card-body">
      <div id="specials-body"></div>
      <div id="specials-empty" class="no-data">No specials set yet</div>
      <div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px;">
        <div class="add-row">
          <input type="text" class="add-input" id="spec-name" placeholder="Item name">
          <input type="text" class="add-input" id="spec-price" placeholder="$0" style="width:60px;flex:none;text-align:center;">
        </div>
        <div class="add-row" style="margin-top:4px;">
          <input type="text" class="add-input" id="spec-desc" placeholder="Description (optional)">
          <select class="add-input" id="spec-tag" style="width:80px;flex:none;">
            <option value="">Tag</option>
            <option value="Chef">Chef</option>
            <option value="Local">Local</option>
            <option value="GF">GF</option>
            <option value="Seasonal">Seasonal</option>
            <option value="BBQ">BBQ</option>
          </select>
          <button class="add-btn" onclick="addSpecial()">+ Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 86 BOARD -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">🚫 86'd Items</span>
      <span class="card-badge red" id="eightysix-badge">0</span>
    </div>
    <div class="card-body">
      <div id="eightysix-body"></div>
      <div id="eightysix-empty" class="no-data">Nothing 86'd — all clear</div>
      <div class="add-row" style="margin-top:8px;">
        <input type="text" class="add-input" id="eightysix-input" placeholder="Item to 86">
        <button class="add-btn red-btn" onclick="add86()">86 It</button>
      </div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="bar-footer">
  Auto-refreshes every 2 min · <a href="Brewhouse_Command_Center.html">Full Dashboard</a> · <a href="Brewhouse_Staff_Hub.html">Staff Hub</a>
</div>

<script>
// ===== CLOCK =====
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock-time').textContent = h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
}
updateClock();
setInterval(updateClock, 15000);

// ===== HELPER =====
function esc(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// ===== RESERVATIONS =====
function renderReservations(rezData) {
  var body = document.getElementById('rez-body');
  var badge = document.getElementById('rez-badge');

  if (!rezData || !rezData.today) {
    body.innerHTML = '<div class="no-data">No reservation data available</div>';
    badge.textContent = '—';
    badge.className = 'card-badge';
    return;
  }

  // Merge data.json reservations with localStorage manual entries
  var bookings = (rezData.today.bookings || []).slice();

  // Load manual reservations from localStorage
  try {
    var manual = JSON.parse(localStorage.getItem('brewhouse_manual_reservations') || '[]');
    var deleted = JSON.parse(localStorage.getItem('brewhouse_deleted_reservations') || '[]');
    var today = new Date().toISOString().split('T')[0];
    manual.forEach(function(m) {
      if (m.date === today && deleted.indexOf(m.id) === -1) {
        bookings.push(m);
      }
    });
    // Filter out deleted data.json entries
    bookings = bookings.filter(function(b) {
      return deleted.indexOf(b.id || b.name + b.time) === -1;
    });
  } catch(e) {}

  // Sort by time
  bookings.sort(function(a, b) {
    return (a.time || '').localeCompare(b.time || '');
  });

  var totalGuests = 0;
  bookings.forEach(function(b) { totalGuests += (b.guests || 0); });

  badge.textContent = bookings.length + ' booked · ' + totalGuests + ' guests';
  badge.className = 'card-badge' + (bookings.length > 0 ? ' green' : '');

  if (!bookings.length) {
    body.innerHTML = '<div class="no-data">No reservations for today</div>';
    return;
  }

  var html = '';
  bookings.forEach(function(b) {
    html += '<div class="rez-item">';
    html += '<div class="rez-time">' + esc(b.time || '—') + '</div>';
    html += '<div class="rez-details">';
    html += '<div class="rez-name">' + esc(b.name || 'Guest') + '</div>';
    var meta = [];
    if (b.source) meta.push(b.source);
    if (b.phone) meta.push(b.phone);
    if (b.notes) meta.push(b.notes);
    if (b.status && b.status !== 'confirmed') meta.push(b.status);
    if (meta.length) html += '<div class="rez-meta">' + esc(meta.join(' · ')) + '</div>';
    html += '</div>';
    html += '<div><div class="rez-guests">' + (b.guests || '?') + '</div><span class="rez-guests-label">guests</span></div>';
    html += '</div>';
  });
  body.innerHTML = html;
}

// ===== STAFF =====
function renderStaff(staffData) {
  var body = document.getElementById('staff-body');
  var badge = document.getElementById('staff-badge');

  if (!staffData || !staffData.staff || !staffData.staff.length) {
    body.innerHTML = '<div class="no-data">No staff data available</div>';
    badge.textContent = '—';
    return;
  }

  var staff = staffData.staff;
  badge.textContent = staff.length + ' on shift';
  badge.className = 'card-badge green';

  // Sort: bartenders first, then servers, then rest
  var order = {'bartender':0, 'bar':0, 'server':1, 'cook':2, 'chef':2, 'busser':3, 'host':4, 'manager':5};
  staff.sort(function(a, b) {
    var ra = 9, rb = 9;
    var roleA = (a.role || '').toLowerCase();
    var roleB = (b.role || '').toLowerCase();
    for (var k in order) {
      if (roleA.indexOf(k) !== -1) ra = order[k];
      if (roleB.indexOf(k) !== -1) rb = order[k];
    }
    return ra - rb;
  });

  var html = '';
  staff.forEach(function(s) {
    var role = (s.role || 'Staff').toLowerCase();
    var avatarClass = 'default';
    if (role.indexOf('bartender') !== -1 || role.indexOf('bar') !== -1) avatarClass = 'bartender';
    else if (role.indexOf('server') !== -1) avatarClass = 'server';
    else if (role.indexOf('cook') !== -1) avatarClass = 'cook';
    else if (role.indexOf('chef') !== -1) avatarClass = 'chef';
    else if (role.indexOf('busser') !== -1 || role.indexOf('bus') !== -1) avatarClass = 'busser';
    else if (role.indexOf('manager') !== -1 || role.indexOf('gm') !== -1) avatarClass = 'manager';
    else if (role.indexOf('host') !== -1) avatarClass = 'host';

    var initials = (s.name || 'S').split(' ').map(function(w) { return w[0]; }).join('').substring(0,2).toUpperCase();

    html += '<div class="staff-row">';
    html += '<div class="staff-avatar ' + avatarClass + '">' + initials + '</div>';
    html += '<div><div class="staff-name">' + esc(s.name) + '</div><div class="staff-role">' + esc(s.role || 'Staff') + '</div></div>';
    html += '</div>';
  });

  // Add hours/overtime info
  if (staffData.hours) {
    html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);">';
    html += 'Total hours: ' + staffData.hours + 'h';
    if (staffData.overtime > 0) html += ' · <span style="color:var(--red);">' + staffData.overtime + 'h OT</span>';
    if (staffData.uncovered > 0) html += ' · <span style="color:var(--red);">' + staffData.uncovered + ' uncovered</span>';
    html += '</div>';
  }

  body.innerHTML = html;
}

// ===== SPECIALS (shared with main dashboard via localStorage) =====
var specials = JSON.parse(localStorage.getItem('brewhouse_specials') || '[]');

function renderSpecials() {
  var body = document.getElementById('specials-body');
  var empty = document.getElementById('specials-empty');
  var badge = document.getElementById('specials-badge');

  badge.textContent = specials.length + ' item' + (specials.length !== 1 ? 's' : '');

  if (!specials.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  var html = '';
  specials.forEach(function(s, i) {
    html += '<div class="special-item">';
    html += '<div class="special-head">';
    html += '<span class="special-name">' + esc(s.name) + '</span>';
    html += '<span class="special-price">' + esc(s.price || '') + '</span>';
    html += '</div>';
    if (s.desc) html += '<div class="special-desc">' + esc(s.desc) + '</div>';
    if (s.tag) html += '<span class="special-tag">' + esc(s.tag) + '</span>';
    html += '</div>';
  });
  body.innerHTML = html;
}

function addSpecial() {
  var name = document.getElementById('spec-name').value.trim();
  var price = document.getElementById('spec-price').value.trim();
  var desc = document.getElementById('spec-desc').value.trim();
  var tag = document.getElementById('spec-tag').value;
  if (!name) { document.getElementById('spec-name').focus(); return; }
  if (price && !price.startsWith('$')) price = '$' + price;
  specials.push({name: name, price: price, desc: desc, tag: tag, added: new Date().toISOString()});
  localStorage.setItem('brewhouse_specials', JSON.stringify(specials));
  document.getElementById('spec-name').value = '';
  document.getElementById('spec-price').value = '';
  document.getElementById('spec-desc').value = '';
  document.getElementById('spec-tag').value = '';
  document.getElementById('spec-name').focus();
  renderSpecials();
}

renderSpecials();

// ===== 86 BOARD =====
var eightysixed = JSON.parse(localStorage.getItem('brewhouse_86') || '[]');

function render86() {
  var body = document.getElementById('eightysix-body');
  var empty = document.getElementById('eightysix-empty');
  var badge = document.getElementById('eightysix-badge');

  badge.textContent = eightysixed.length;
  badge.className = 'card-badge' + (eightysixed.length > 0 ? ' red' : '');

  if (!eightysixed.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  var html = '';
  eightysixed.forEach(function(item, i) {
    html += '<div class="eightysix-item">';
    html += '<span class="eightysix-x">✕</span>';
    html += '<span class="eightysix-name">' + esc(item.name) + '</span>';
    html += '<button class="eightysix-remove" onclick="remove86(' + i + ')" title="Back in stock">↩ Back</button>';
    html += '</div>';
  });
  body.innerHTML = html;
}

function add86() {
  var input = document.getElementById('eightysix-input');
  var name = input.value.trim();
  if (!name) { input.focus(); return; }
  eightysixed.push({name: name, added: new Date().toISOString()});
  localStorage.setItem('brewhouse_86', JSON.stringify(eightysixed));
  input.value = '';
  input.focus();
  render86();
}

function remove86(i) {
  eightysixed.splice(i, 1);
  localStorage.setItem('brewhouse_86', JSON.stringify(eightysixed));
  render86();
}

render86();

// ===== LOAD DATA.JSON =====
function loadData() {
  fetch('data.json?t=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d) {
      renderStaff(d.slingToday);
      renderReservations(d.reservations);
      // Also refresh specials from localStorage in case main dashboard changed them
      specials = JSON.parse(localStorage.getItem('brewhouse_specials') || '[]');
      renderSpecials();
      eightysixed = JSON.parse(localStorage.getItem('brewhouse_86') || '[]');
      render86();
    })
    .catch(function(e) {
      console.error('data.json load failed:', e);
    });
}

loadData();

// Auto-refresh every 2 minutes
setInterval(loadData, 120000);

// ===== ENTER KEY SUPPORT =====
document.getElementById('spec-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addSpecial();
});
document.getElementById('spec-price').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addSpecial();
});
document.getElementById('eightysix-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') add86();
});

// ===== PWA SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function() {
    console.log('SW registered');
  }).catch(function(e) { console.log('SW error:', e); });
}
</script>

</body>
</html>
